name: SempreSol – Publica post diari a Instagram

on:
  # Cada dia a les 05:30 UTC → 07:30 CEST
  schedule:
    - cron: "30 5 * * *"

  # Permet executar-ho manualment des de Actions > Run workflow
  workflow_dispatch:

jobs:
  post:
    name: Genera imatge i publica a Instagram
    runs-on: ubuntu-latest

    permissions:
      contents: write   # per fer commit de la imatge generada

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout del repositori
        uses: actions/checkout@v4

      # ── 2. Python ────────────────────────────────────────────────────────
      - name: Configura Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: sempresol-instagram/requirements.txt

      # ── 3. Fonts ─────────────────────────────────────────────────────────
      - name: Instal·la fonts
        run: sudo apt-get install -y fonts-dejavu-core fonts-liberation

      # ── 4. Dependències Python ────────────────────────────────────────────
      - name: Instal·la dependències Python
        working-directory: sempresol-instagram
        run: pip install -r requirements.txt

      # ── 5. Genera la imatge del dia ──────────────────────────────────────
      - name: Genera imatge del dia
        working-directory: sempresol-instagram
        env:
          MODE: generate
        run: python post.py

      # ── 6. Commit + push de la imatge (perquè la URL raw sigui pública) ───
      - name: Desa imatge al repositori
        run: |
          git config user.name  "SempreSol Bot"
          git config user.email "bot@sempresol.cat"
          git add sempresol-instagram/images/
          git diff --cached --quiet || git commit -m "🌞 Imatge $(date +'%Y-%m-%d')"
          git push

      # ── 7. Publica a Instagram + renova el token ─────────────────────────
      - name: Publica a Instagram
        working-directory: sempresol-instagram
        env:
          MODE: publish
          IG_ACCESS_TOKEN:   ${{ secrets.IG_ACCESS_TOKEN }}
          IG_USER_ID:        ${{ secrets.IG_USER_ID }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME:   ${{ github.ref_name }}
          IMAGES_SUBPATH:    sempresol-instagram/images
        run: python post.py

      # ── 8. Desa el token renovat al secret (auto-renovació) ──────────────
      - name: Renova el secret IG_ACCESS_TOKEN
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          if [ -f sempresol-instagram/new_token.txt ]; then
            gh secret set IG_ACCESS_TOKEN < sempresol-instagram/new_token.txt
            rm -f sempresol-instagram/new_token.txt
            echo "Secret IG_ACCESS_TOKEN actualitzat."
          else
            echo "Cap token nou per actualitzar (normal si el token té menys de 24h)."
          fi
