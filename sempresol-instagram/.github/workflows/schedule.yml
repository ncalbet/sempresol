name: SempreSol – Programa posts Instagram

on:
  # Executa cada 5 dies a les 07:00 UTC
  schedule:
    - cron: "0 7 */5 * *"

  # Permet executar manualment des de GitHub Actions > Run workflow
  workflow_dispatch:
    inputs:
      days_ahead:
        description: "Quants dies programar (per defecte 5)"
        required: false
        default: "5"

jobs:
  post:
    name: Genera imatges i programa posts
    runs-on: ubuntu-latest

    permissions:
      contents: write   # Necessari per fer commit de les imatges generades

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout del repositori
        uses: actions/checkout@v4

      # ── 2. Python ────────────────────────────────────────────────────────
      - name: Configura Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      # ── 3. Fonts ─────────────────────────────────────────────────────────
      - name: Instal·la fonts
        run: sudo apt-get install -y fonts-dejavu-core fonts-liberation

      # ── 4. Dependències Python ────────────────────────────────────────────
      - name: Instal·la dependències Python
        run: pip install -r requirements.txt

      # ── 5. Executa el bot ─────────────────────────────────────────────────
      - name: Executa post.py
        env:
          BUFFER_API_KEY:    ${{ secrets.BUFFER_API_KEY }}
          BUFFER_PROFILE_ID: ${{ secrets.BUFFER_PROFILE_ID }}
          DAYS_AHEAD:        ${{ github.event.inputs.days_ahead || '5' }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME:   ${{ github.ref_name }}
        run: python post.py

      # ── 6. Commit de les imatges generades ───────────────────────────────
      - name: Desa imatges al repositori
        run: |
          git config user.name  "SempreSol Bot"
          git config user.email "bot@sempresol.cat"
          git add images/
          # Només fa commit si hi ha canvis
          git diff --cached --quiet || git commit -m "🌞 Imatges programades $(date +'%Y-%m-%d')"
          git push
